[ScalabilityGroups]
sg.ResolutionQuality=@ResolutionQuality
sg.ViewDistanceQuality=@ViewDistanceQuality  
sg.AntiAliasingQuality=@AntiAliasingQuality
sg.ShadowQuality=@ShadowQuality
sg.PostProcessQuality=@PostProcessQuality
sg.TextureQuality=@TextureQuality
sg.EffectsQuality=@EffectsQuality
sg.FoliageQuality=@FoliageQuality
sg.ShadingQuality=@ShadingQuality

[ResolutionQuality@0]
r.ScreenPercentage=50

[ViewDistanceQuality@0]
r.ViewDistanceScale=0.4
r.SkeletalMeshLODBias=2
r.StaticMeshLODBias=1

[AntiAliasingQuality@0]
r.AntiAliasingMethod=0
r.MSAACount=1

[ShadowQuality@0]
r.ShadowQuality=0
r.Shadow.CSM.MaxCascades=1
r.Shadow.MaxResolution=512

[PostProcessQuality@0]
r.DefaultFeature.Bloom=False
r.DefaultFeature.AmbientOcclusion=False
r.DefaultFeature.MotionBlur=False

[TextureQuality@0]
r.Streaming.MipBias=2
r.MaxAnisotropy=1

[EffectsQuality@0]
r.ParticleLODBias=2

[FoliageQuality@0]
foliage.DensityScale=0.2

[ShadingQuality@0]
r.MaterialQualityLevel=0
r.ForwardShading=1
r.VertexFoggingForOpaque=0